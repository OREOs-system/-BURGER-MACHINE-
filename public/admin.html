<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Burger Machine</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="brand-bar">
    <h1>Admin Panel</h1>
  </div>
  <div id="admin-auth" class="box centered">
    <h2>Admin Login</h2>
    <div class="message" id="admin-message"></div>
    <label>Username<input type="text" id="admin-username"></label>
    <label>Password<input type="password" id="admin-password"></label>
    <button id="admin-login">Log In</button>
  </div>
  <div id="admin-panel" class="app hidden">
    <header class="topbar">
      <div class="topbar-left"><div class="user-info">Admin</div></div>
      <nav class="topnav"><button id="admin-logout">Log Out</button></nav>
    </header>
    <main>
      <h2>Orders</h2>
      <div id="admin-orders" class="history-list"></div>
    </main>
  </div>
  <script src="js/admin.js"></script>
</body>
</html>
