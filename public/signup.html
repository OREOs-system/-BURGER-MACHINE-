<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - Burger Machine</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-panel">
      <h1>Create Account</h1>
      <form id="signupForm">
        <label>Username</label>
        <input type="text" id="signupUsername" required />
        <label>First name</label>
        <input type="text" id="signupFirstName" required />
        <label>Last name</label>
        <input type="text" id="signupLastName" required />
        <label>Email</label>
        <input type="email" id="signupEmail" required />
        <label>Password</label>
        <input type="password" id="signupPassword" required />
        <label>Confirm password</label>
        <input type="password" id="signupConfirmPassword" required />
        <label>Contact number</label>
        <input type="text" id="signupContact" required />
        <label>Address</label>
        <input type="text" id="signupAddress" required />
        <button type="submit">Sign Up</button>
      </form>
      <div class="auth-actions">
        <a href="/">Back to login</a>
      </div>
      <div class="message" id="signupMessage"></div>
    </div>
  </div>
  <script src="/js/auth.js"></script>
</body>
</html>
