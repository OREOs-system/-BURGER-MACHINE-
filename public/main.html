<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Burger Machine</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header class="top-nav">
    <div>
      <div class="brand">Burger Machine</div>
      <div class="subheading" id="welcomeText">Welcome!</div>
    </div>
    <nav>
      <button data-view="menu" class="active">Menu</button>
      <button data-view="history">Transaction history</button>
      <button data-view="settings">Settings</button>
      <button id="logoutBtn">Log out</button>
    </nav>
  </header>

  <main class="page-body">
    <section id="menuSection" class="page-section active">
      <div class="section-header">
        <h2>Menu</h2>
        <div class="cart-summary">
          <button id="toggleCart">Cart (<span id="cartCount">0</span>)</button>
        </div>
      </div>
      <div class="menu-grid" id="menuGrid"></div>
      <div id="cartPanel" class="cart-panel hidden">
        <h3>Your Cart</h3>
        <div id="cartItems"></div>
        <div class="cart-footer">
          <div>Total: ₱<span id="cartTotal">0.00</span></div>
          <div>
            <button id="clearCart">Clear</button>
            <button id="placeOrder">Place order</button>
          </div>
        </div>
      </div>
    </section>

    <section id="historySection" class="page-section">
      <h2>Transaction History</h2>
      <div id="historyList" class="history-list"></div>
    </section>

    <section id="settingsSection" class="page-section">
      <h2>Settings</h2>
      <form id="settingsForm" class="settings-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="settingsUsername" disabled />
        </div>
        <div class="form-group">
          <label>First name</label>
          <input type="text" id="settingsFirstName" required />
        </div>
        <div class="form-group">
          <label>Last name</label>
          <input type="text" id="settingsLastName" required />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="settingsEmail" required />
        </div>
        <div class="form-group">
          <label>Contact number</label>
          <input type="text" id="settingsContact" required />
        </div>
        <div class="form-group">
          <label>Address</label>
          <input type="text" id="settingsAddress" required />
        </div>
        <button type="submit">Save changes</button>
      </form>
      <div class="message" id="settingsMessage"></div>
    </section>
  </main>

  <div id="orderConfirm" class="modal hidden">
    <div class="modal-body">
      <h3>Confirm Order</h3>
      <p>Are you sure you want to place this order?</p>
      <div class="modal-actions">
        <button id="confirmOrder">Yes, place order</button>
        <button id="cancelOrder">Cancel</button>
      </div>
    </div>
  </div>

  <script src="/js/main.js"></script>
</body>
</html>
