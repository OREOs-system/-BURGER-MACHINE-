<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Burger Machine | Login / Sign Up</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1>Burger Machine</h1>
      <div class="auth-tabs">
        <button id="loginTab" class="active">Log In</button>
        <button id="signupTab">Sign Up</button>
      </div>
      <div id="loginForm" class="form-panel">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="loginUsername" placeholder="Enter username" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Enter password" autocomplete="current-password" required />
        </div>
        <button id="loginButton" class="primary-btn">Log In</button>
        <p class="note">Admin? <a href="admin.html">Go to admin login</a></p>
      </div>
      <div id="signupForm" class="form-panel hidden">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="signupUsername" placeholder="Choose a username" />
        </div>
        <div class="split-row">
          <div class="form-group">
            <label>First name</label>
            <input type="text" id="signupFirstName" placeholder="First name" />
          </div>
          <div class="form-group">
            <label>Last name</label>
            <input type="text" id="signupLastName" placeholder="Last name" />
          </div>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signupEmail" placeholder="Email address" />
        </div>
        <div class="form-group">
          <label>Contact number</label>
          <input type="text" id="signupContact" placeholder="Contact number" />
        </div>
        <div class="form-group">
          <label>Address</label>
          <input type="text" id="signupAddress" placeholder="Delivery address" />
        </div>
        <div class="split-row">
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="signupPassword" placeholder="Enter password" />
          </div>
          <div class="form-group">
            <label>Confirm password</label>
            <input type="password" id="signupConfirmPassword" placeholder="Confirm password" />
          </div>
        </div>
        <button id="signupButton" class="primary-btn">Sign Up</button>
      </div>
      <p id="authError" class="error-message"></p>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
