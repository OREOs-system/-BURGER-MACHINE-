<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Burger Machine | Main</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">Burger Machine</div>
      <nav class="topnav">
        <button data-section="menu" class="nav-link active">Menu</button>
        <button data-section="history" class="nav-link">Transaction History</button>
        <button data-section="settings" class="nav-link">Settings</button>
        <button id="logoutButton" class="logout-btn">Log Out</button>
      </nav>
    </header>
    <main class="content-area">
      <section id="menuSection" class="section active-section">
        <div class="section-header">
          <h2>Menu</h2>
          <div class="cart-summary">
            <span id="cartCount">0 items</span>
            <button id="openCartBtn" class="secondary-btn">View Cart</button>
          </div>
        </div>
        <div class="menu-summary">
          <div>
            <span id="orderItemCount">0 items</span>
            <strong id="orderSummaryTotal">₱0.00</strong>
          </div>
          <button id="quickPlaceOrderBtn" class="primary-btn">Review Order</button>
        </div>
        <div id="menuGrid" class="menu-grid"></div>
      </section>

      <section id="historySection" class="section hidden">
        <h2>Transaction History</h2>
        <div id="historyList" class="history-list"></div>
      </section>

      <section id="settingsSection" class="section hidden">
        <h2>Account Settings</h2>
        <div class="profile-card">
          <form id="profileForm" class="profile-form">
            <div class="split-row">
              <div class="form-group">
                <label>Username</label>
                <input type="text" id="profileUsername" disabled />
              </div>
              <div class="form-group">
                <label>Email</label>
                <input type="email" id="profileEmail" />
              </div>
            </div>
            <div class="split-row">
              <div class="form-group">
                <label>First name</label>
                <input type="text" id="profileFirstName" />
              </div>
              <div class="form-group">
                <label>Last name</label>
                <input type="text" id="profileLastName" />
              </div>
            </div>
            <div class="form-group">
              <label>Contact number</label>
              <input type="text" id="profileContact" />
            </div>
            <div class="form-group">
              <label>Address</label>
              <input type="text" id="profileAddress" />
            </div>
            <button type="button" id="saveProfileBtn" class="primary-btn">Save Changes</button>
          </form>
          <p id="profileMessage" class="success-message"></p>
        </div>
      </section>
    </main>

    <div id="cartPanel" class="cart-panel hidden">
      <div class="cart-header">
        <h3>Cart</h3>
        <button id="closeCartBtn" class="close-btn">×</button>
      </div>
      <div id="cartItems" class="cart-items"></div>
      <div class="cart-footer">
        <div>
          <span>Total:</span>
          <strong id="cartTotal">₱0.00</strong>
        </div>
        <div class="cart-actions">
          <button id="clearCartBtn" class="secondary-btn">Clear Cart</button>
          <button id="placeOrderBtn" class="primary-btn">Place Order</button>
        </div>
      </div>
      <p id="cartMessage" class="error-message"></p>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
